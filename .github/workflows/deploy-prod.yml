name: Deploy Prod

on:
  workflow_dispatch:

env:
  ENVIRONMENT: prod
  PROJECT: shopcloud
  TF_STATE_BUCKET_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: us-east-1
            region_name: us
            tfvars: prod-us.tfvars.json
            state_key: prod/us/terraform.tfstate
          - region: eu-central-1
            region_name: eu
            tfvars: prod-eu.tfvars.json
            state_key: prod/eu/terraform.tfstate

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: >
          terraform init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="key=${{ matrix.state_key }}"
          -backend-config="region=${{ env.TF_STATE_BUCKET_REGION }}"
          -backend-config="encrypt=true"
          -backend-config="use_lockfile=true"

      - name: Terraform create ECR repositories
        working-directory: infra
        run: terraform apply -auto-approve -target=aws_ecr_repository.service -var-file="${{ matrix.tfvars }}" -var="aws_region=${{ matrix.region }}" -var="image_tag=${{ github.sha }}"

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ matrix.region }}"
          REGION_SLUG="${REGION//-/}"
          TAG="${{ github.sha }}"
          for SERVICE in auth catalog cart checkout admin frontend; do
            REPO="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$PROJECT-$ENVIRONMENT-$REGION_SLUG-$SERVICE"
            docker build -t "$REPO:$TAG" -f "services/$SERVICE/Dockerfile" .
            docker push "$REPO:$TAG"
          done

      - name: Terraform apply prod
        working-directory: infra
        run: terraform apply -auto-approve -var-file="${{ matrix.tfvars }}" -var="aws_region=${{ matrix.region }}" -var="image_tag=${{ github.sha }}"
