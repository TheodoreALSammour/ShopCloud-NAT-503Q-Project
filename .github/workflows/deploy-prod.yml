name: Deploy Prod

on:
  workflow_dispatch:

env:
  ENVIRONMENT: prod
  PROJECT: shopcloud

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: >
          terraform init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="key=prod/terraform.tfstate"
          -backend-config="region=${{ secrets.AWS_REGION }}"
          -backend-config="encrypt=true"
          -backend-config="use_lockfile=true"

      - name: Terraform create ECR repositories
        working-directory: infra
        run: terraform apply -auto-approve -target=aws_ecr_repository.service -var-file="prod.tfvars.json" -var="image_tag=${{ github.sha }}"

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ secrets.AWS_REGION }}"
          TAG="${{ github.sha }}"
          for SERVICE in auth catalog cart checkout admin; do
            REPO="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$PROJECT-$ENVIRONMENT-$SERVICE"
            docker build -t "$REPO:$TAG" -f "services/$SERVICE/Dockerfile" .
            docker push "$REPO:$TAG"
          done

      - name: Terraform apply prod
        working-directory: infra
        run: terraform apply -auto-approve -var-file="prod.tfvars.json" -var="image_tag=${{ github.sha }}"
