services:
  auth:
    build: ./services/auth
    ports:
      - "3000:3000"

  catalog:
    build: ./services/catalog
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  cart:
    build: ./services/cart
    ports:
      - "3002:3002"
    depends_on:
      - redis

  checkout:
    build: ./services/checkout
    ports:
      - "3003:3003"
    depends_on:
      - postgres

  admin:
    build: ./services/admin
    ports:
      - "3004:3004"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: shopcloud
      POSTGRES_PASSWORD: shopcloud123
      POSTGRES_DB: shopcloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: