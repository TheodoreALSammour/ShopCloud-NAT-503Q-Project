services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  catalog:
    build:
      context: .
      dockerfile: services/catalog/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  cart:
    build:
      context: .
      dockerfile: services/cart/Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      - redis

  checkout:
    build:
      context: .
      dockerfile: services/checkout/Dockerfile
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - redis

  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    ports:
      - "3004:3004"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: shopcloud
      POSTGRES_PASSWORD: shopcloud123
      POSTGRES_DB: shopcloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
